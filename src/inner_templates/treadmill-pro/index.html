<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Treadmill Pro · QZ Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- TIMELINE -->
    <div id="timeline-section">
      <div id="timeline-header">
        <span id="timeline-title">Timeline</span>
        <span id="workout-name">–</span>
      </div>
      <div id="timeline-track">
        <div id="timeline-bar">
          <div id="tl-completed"></div>
          <div id="tl-current"></div>
          <div id="tl-remaining"></div>
        </div>
        <div id="tl-runner">&#x1F3C3;</div>
      </div>
      <div id="timeline-times">
        <span id="tl-elapsed">0:00</span>
        <span id="tl-remain-label"></span>
      </div>
    </div>

    <!-- INTERVAL INFO -->
    <div id="interval-info">
      <div id="interval-title-row">
        <span id="interval-name">–</span>
        <span id="interval-badge"></span>
      </div>
      <div id="interval-detail">–</div>
    </div>

    <!-- SPEED + WAVEFORM (side by side) -->
    <div id="speed-section">
      <div id="speed-left">
        <div class="section-label">Current Speed</div>
        <div id="speed-value">0.0</div>
        <div id="speed-stats">
          Avg: <span id="speed-avg">–</span> &nbsp;|&nbsp; Max: <span id="speed-max">–</span>
        </div>
      </div>
      <div id="speed-right">
        <canvas id="sparkline"></canvas>
      </div>
    </div>

    <!-- 2×2 METRIC GRID -->
    <div id="metrics-grid">
      <div class="metric-card card-cadence">
        <div class="card-top">
          <span class="card-icon">&#x1F6B6;</span>
          <span class="card-label">Cadence</span>
        </div>
        <div class="card-value" id="val-cadence">0</div>
        <div class="card-unit">rpm</div>
      </div>
      <div class="metric-card card-watts">
        <div class="card-top">
          <span class="card-icon">&#x26A1;</span>
          <span class="card-label">AVG Watt</span>
        </div>
        <div class="card-value" id="val-watts">–</div>
      </div>
      <div class="metric-card card-hr">
        <div class="card-top">
          <span class="card-icon hr-beat">&#x2665;</span>
          <span class="card-label">Heart Rate</span>
        </div>
        <div class="card-value" id="val-hr">0</div>
        <div class="card-unit">bpm</div>
      </div>
      <div class="metric-card card-kcal">
        <div class="card-top">
          <span class="card-icon">&#x1F525;</span>
          <span class="card-label">Total KCal</span>
        </div>
        <div class="card-value" id="val-kcal">–</div>
      </div>
    </div>

    <!-- ODOMETER -->
    <div id="odometer-row">
      <div id="odo-icon">&#x1F4CD;</div>
      <div id="odo-content">
        <div class="section-label">Odometer</div>
        <div id="odo-value"><span id="val-dist">0.00</span><span id="odo-unit"> km</span></div>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div id="statusbar">
      <div id="status-left">
        <span id="device-name">QZ Fitness</span>
      </div>
      <div id="status-center">
        Total: <span id="elapsed">00:00:00</span>
      </div>
      <div id="status-right">
        <span id="conn-status">Connecting…</span>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
