<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Treadmill Pro · QZ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- TOP BAR -->
    <div id="topbar">
      <span id="conn-status">CONNECTING…</span>
      <span id="elapsed">00:00</span>
      <span id="topbar-right"></span>
    </div>

    <!-- CURRENT SEGMENT -->
    <div id="segment-section">
      <div id="segment-label">CURRENT</div>
      <div id="segment-name">–</div>
    </div>

    <!-- STATS ROW -->
    <div id="stats-row">
      <div class="stat-item">
        <div class="stat-value" id="val-dist">–</div>
        <div class="stat-label">DISTANCE</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-value" id="val-time">00:00</div>
        <div class="stat-label">TIME</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-value" id="val-avg-speed">–</div>
        <div class="stat-label">AVG SPEED</div>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div id="progress-section">
      <div id="progress-track">
        <div id="progress-dots"></div>
        <div id="progress-fill"></div>
      </div>
    </div>

    <!-- NEXT LAP / MIDDLE SECTION -->
    <div id="middle-section">
      <canvas id="sparkline"></canvas>
      <div id="next-lap-label">NEXT LAP</div>
      <div id="lap-stats">
        <div class="lap-item">
          <div class="lap-value" id="val-pace">–</div>
          <div class="lap-label">PACE min/km</div>
        </div>
        <div class="lap-item lap-hr">
          <div class="lap-value" id="val-hr">–</div>
          <div class="lap-label"><span class="hr-icon">♥</span> HEART RATE</div>
        </div>
        <div class="lap-item">
          <div class="lap-value" id="val-cadence">–</div>
          <div class="lap-label">CADENCE spm</div>
        </div>
      </div>
    </div>

    <!-- SPEED CONTROL -->
    <div id="speed-control" class="control-row control-speed">
      <button class="ctrl-btn ctrl-minus" onclick="sendCmd('speed-')">−</button>
      <div class="ctrl-center">
        <div class="ctrl-value" id="val-speed">0.0</div>
        <div class="ctrl-sub" id="val-target-speed"></div>
      </div>
      <button class="ctrl-btn ctrl-plus" onclick="sendCmd('speed+')">+</button>
    </div>

    <!-- INCLINE CONTROL -->
    <div id="incline-control" class="control-row control-incline">
      <button class="ctrl-btn ctrl-minus" onclick="sendCmd('inclination-')">−</button>
      <div class="ctrl-center">
        <div class="ctrl-value" id="val-incline">0.0</div>
        <div class="ctrl-sub">INCLINE</div>
      </div>
      <button class="ctrl-btn ctrl-plus" onclick="sendCmd('inclination+')">+</button>
    </div>

    <!-- ACTION BUTTONS -->
    <div id="action-row">
      <button class="action-btn action-secondary" onclick="sendCmd('lap')">↺ Next Lap</button>
      <button class="action-btn action-primary" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
