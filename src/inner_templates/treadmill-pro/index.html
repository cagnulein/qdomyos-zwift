<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Treadmill Pro · QZ Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- PROGRAM HEADER -->
    <div id="program-header" class="program-hidden">
      <div id="program-top">
        <div id="program-name">–</div>
        <div id="program-interval"></div>
      </div>
      <div id="program-row-info"></div>
      <div id="progress-track">
        <div id="progress-fill"></div>
        <div id="progress-glow"></div>
      </div>
      <div id="progress-footer">
        <span id="prog-label">Session progress</span>
        <span id="row-remaining"></span>
      </div>
    </div>

    <!-- SPEED HERO -->
    <div id="speed-hero">
      <div id="speed-label">CURRENT SPEED</div>
      <div id="speed-number-wrap">
        <div id="speed-value">0.0</div>
        <div id="speed-unit">km/h</div>
      </div>
      <canvas id="sparkline"></canvas>
      <div id="speed-subrow">
        <div class="sub-stat">
          <span class="sub-val" id="speed-avg">–</span>
          <span class="sub-lbl">AVG</span>
        </div>
        <div id="speed-divider"></div>
        <div class="sub-stat">
          <span class="sub-val" id="speed-max">–</span>
          <span class="sub-lbl">MAX</span>
        </div>
        <div id="speed-divider2"></div>
        <div class="sub-stat" id="target-wrap" style="display:none">
          <span class="sub-val" id="speed-target">–</span>
          <span class="sub-lbl">TARGET</span>
        </div>
      </div>
    </div>

    <!-- METRIC TILES -->
    <div id="metrics">
      <div class="tile tile-pace">
        <div class="tile-icon">⏱</div>
        <div class="tile-value" id="val-pace">–</div>
        <div class="tile-label">PACE  min/km</div>
      </div>
      <div class="tile tile-incline">
        <div class="tile-icon">⛰</div>
        <div class="tile-value" id="val-incline">0.0</div>
        <div class="tile-label">INCLINE  %</div>
      </div>
      <div class="tile tile-cadence">
        <div class="tile-icon">👟</div>
        <div class="tile-value" id="val-cadence">–</div>
        <div class="tile-label">CADENCE  spm</div>
      </div>
      <div class="tile tile-hr">
        <div class="tile-icon hr-icon">♥</div>
        <div class="tile-value" id="val-hr">–</div>
        <div class="tile-label">HEART RATE  bpm</div>
      </div>
    </div>

    <!-- BOTTOM ROW -->
    <div id="bottom">
      <div class="bottom-stat">
        <div class="bottom-val" id="val-dist">–</div>
        <div class="bottom-lbl">KM</div>
      </div>
      <div class="bottom-sep"></div>
      <div class="bottom-stat">
        <div class="bottom-val" id="val-watts">–</div>
        <div class="bottom-lbl">WATTS</div>
      </div>
      <div class="bottom-sep"></div>
      <div class="bottom-stat">
        <div class="bottom-val" id="val-kcal">–</div>
        <div class="bottom-lbl">KCAL</div>
      </div>
    </div>

    <!-- STATUS STRIP -->
    <div id="statusbar">
      <div id="live-badge"><span id="live-dot"></span>LIVE</div>
      <div id="elapsed">00:00</div>
      <div id="conn-status">CONNECTING…</div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
