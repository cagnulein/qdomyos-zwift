<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Workout Editor</title>
    <link rel="stylesheet" href="workout-editor.css">
    <script src="../chartjs/resize-observer.min.js"></script>
    <script src="../chartjs/chartjs.3.4.1.min.js"></script>
    <script src="../chartjs/globals.js"></script>
    <script>
        // Check if we're running in a browser (offline) or embedded in QZ app
        // We detect offline mode by checking if we can access the WebSocket
        window.QZ_OFFLINE = false;
        try {
            // If we have qt object (Qt Desktop) or we're loading from localhost, we're online
            if (typeof window.qt !== 'undefined' ||
                window.location.hostname === 'localhost' ||
                window.location.hostname === '127.0.0.1') {
                window.QZ_OFFLINE = false;
            }
        } catch (e) {
            window.QZ_OFFLINE = true;
        }
    </script>
    <script src="../chartjs/main_ws_manager.js"></script>
    <script src="workout-editor.js"></script>
    <script src="workout-editor-app.js" defer></script>
</head>
<body>
    <div id="app" aria-labelledby="workoutEditorTitle">
        <div class="toolbar">
            <h1 class="toolbar-title" id="workoutEditorTitle">Workout Editor</h1>
            <div class="toolbar-controls">
                <label>
                    <span>Name</span>
                    <input type="text" id="workoutName" placeholder="New workout" autocomplete="off" aria-label="Workout name">
                </label>
                <label>
                    <span>Device</span>
                    <select id="deviceSelect" aria-label="Workout device type">
                        <option value="bike">Bike</option>
                        <option value="treadmill">Treadmill</option>
                        <option value="elliptical">Elliptical</option>
                        <option value="rower">Rower</option>
                    </select>
                </label>
                <button id="newWorkout" class="small" type="button" aria-label="Create a new workout">New</button>
                <button id="saveWorkout" class="primary small" type="button" aria-label="Save workout">Save</button>
                <button id="saveStartWorkout" class="primary small" type="button" aria-label="Save workout and start it">Save &amp; Start</button>
                <label class="checkbox-label">
                    <input type="checkbox" id="advancedToggle" aria-label="Show advanced interval fields">
                    <span>Advanced</span>
                </label>
            </div>
        </div>

        <main class="content" aria-label="Workout editor controls">
            <section class="interval-panel" aria-labelledby="intervalPanelTitle">
                <div class="interval-panel-header">
                    <h2 id="intervalPanelTitle" class="visually-hidden">Intervals</h2>
                    <div class="interval-panel-actions">
                        <button id="addInterval" class="primary small" type="button" aria-label="Add interval">Add Interval</button>
                        <button id="repeatSelection" class="small" type="button" aria-label="Repeat selected intervals">Repeat Selection</button>
                        <button id="clearIntervals" class="small danger" type="button" aria-label="Clear all intervals">Clear</button>
                    </div>
                    <div class="interval-panel-hint" id="intervalPanelHint">Select consecutive rows to repeat them quickly.</div>
                </div>
                <div id="intervalList" class="interval-list" role="list" aria-describedby="intervalPanelHint"></div>
            </section>

            <section class="preview-panel" aria-labelledby="chartTitle">
                <div class="chart-card">
                    <header>
                        <div class="chart-title" id="chartTitle">Workout Preview</div>
                        <div class="chart-meta" id="chartMeta"></div>
                    </header>
                    <div class="chart-wrapper">
                        <canvas id="workoutChart" role="img" aria-label="Workout preview chart"></canvas>
                    </div>
                    <div class="legend" id="legend" aria-label="Chart legend"></div>
                </div>
                <div class="status-strip" role="status" aria-live="polite">
                    <div>Total: <span id="statusDuration">0:00</span></div>
                    <div>Intervals: <span id="statusIntervals">0</span></div>
                    <div class="status-message" id="statusMessage" aria-live="polite"></div>
                    <div class="status-message error hidden" id="offlineBanner">Offline mode: changes not saved</div>
                </div>
                <div class="program-bar">
                    <select id="programSelect" aria-label="Saved workout programs"></select>
                    <button id="loadProgram" class="small" type="button" aria-label="Load selected workout program">Load</button>
                    <button id="deleteProgram" class="small danger" type="button" aria-label="Delete selected workout program">Delete</button>
                    <button id="refreshPrograms" class="small" type="button" aria-label="Refresh workout program list">Refresh</button>
                </div>
            </section>
        </main>
    </div>

    <!-- Custom dialogs for iOS WebView compatibility -->
    <div id="customDialog" class="custom-dialog hidden" role="dialog" aria-hidden="true" aria-modal="true" aria-labelledby="customDialogTitle" aria-describedby="customDialogMessage">
        <div class="custom-dialog-overlay"></div>
        <div class="custom-dialog-content">
            <div class="custom-dialog-header">
                <h3 id="customDialogTitle"></h3>
            </div>
            <div class="custom-dialog-body">
                <p id="customDialogMessage"></p>
                <input type="text" id="customDialogInput" class="hidden" aria-label="Dialog input">
            </div>
            <div class="custom-dialog-footer">
                <button id="customDialogCancel" class="small" type="button">Cancel</button>
                <button id="customDialogConfirm" class="small primary" type="button">OK</button>
            </div>
        </div>
    </div>
</body>
</html>
