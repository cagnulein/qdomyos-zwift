<!doctype html>
<html>
<head>
    <title>Treadmill Chart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="resize-observer.min.js"></script>
    <script src="jquery-3.6.0.min.js"></script>
    <script src="chartjs.3.4.1.min.js"></script>
    <script src="moment.js"></script>
    <script src="chartjs-adapter-moment.js"></script>
    <script src="chartjs-plugin-annotation.min.js"></script>
    <script src="globals.js"></script>
    <script src="main_ws_manager.js"></script>
    <script src="../i18n/i18n.js"></script>
    <script src="dotreadmillchartlive.js"></script>
    <script src="dochartliveheart.js"></script>
    <script src="html2canvas.min.js"></script>
    <style>
    canvas {
        -moz-user-select: none;
        -webkit-user-select: none;
        -ms-user-select: none;
    }
    html, body {
        -ms-content-zooming: none;
        touch-action: none;
        content-zooming: none;
        overflow-y: hidden;
        overflow-x: hidden;
        overflow-y: none;
        overflow-x: none;
        margin: 0px;
        height: 100%;
        width: 100%;
    }
    table {
        height: 100%;
        width: 100%;
    }
    </style>
</head>

<body style="background-color:#1d2330">
    <table style="border-spacing: 0px">
        <tr>
            <td style="width:50%;height:100%;">
                <div id="divcanvas" style="width:100%;height:100%; background-color:white; border: 0px solid #aaa; overflow: hidden;">
                    <canvas id="canvas"></canvas>
                </div>
            </td>
            <td style="width:50%;height:100%;">
                <div id="divcanvasheart" style="width:100%;height:100%; background-color:white; border: 0px solid #aaa; overflow: hidden;">
                    <canvas id="canvasheart"></canvas>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
