<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Workout Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1d2330;
            color: white;
            padding: 10px;
        }

        #chart-container {
            width: 100%;
            height: 400px;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@2.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>
    <div id="chart-container">
        <canvas id="workoutChart"></canvas>
    </div>

    <script>
        let chart = null;
        let miles = 1; // 1 = km, 0.621371 = miles

        // HR zone colors matching the workout history chart
        const hrZoneColors = {
            // Zone 1: light steel blue
            1: { line: 'rgb(176, 192, 222)', fill: 'rgba(176, 192, 222, 0.25)' },
            // Zone 2: green
            2: { line: 'rgb(75, 192, 192)', fill: 'rgba(75, 192, 192, 0.25)' },
            // Zone 3: yellow
            3: { line: 'rgb(255, 205, 86)', fill: 'rgba(255, 205, 86, 0.25)' },
            // Zone 4: orange
            4: { line: 'rgb(255, 159, 64)', fill: 'rgba(255, 159, 64, 0.25)' },
            // Zone 5: red
            5: { line: 'rgb(255, 29, 0)', fill: 'rgba(255, 29, 0, 0.25)' }
        };

        // HR zone settings (populated from backend)
        let maxHeartRate = 190;
        let heartZoneBoundaries = [110, 130, 150, 170]; // BPM boundaries between zones 1-2, 2-3, 3-4, 4-5

        // Determine which HR zone a BPM value falls into
        function getHRZone(bpm) {
            if (bpm < heartZoneBoundaries[0]) return 1;
            if (bpm < heartZoneBoundaries[1]) return 2;
            if (bpm < heartZoneBoundaries[2]) return 3;
            if (bpm < heartZoneBoundaries[3]) return 4;
            return 5;
        }

        // Convert zone number to BPM range
        function zoneToBpmRange(zone) {
            switch (zone) {
                case 1: return { min: 0, max: heartZoneBoundaries[0] };
                case 2: return { min: heartZoneBoundaries[0], max: heartZoneBoundaries[1] };
                case 3: return { min: heartZoneBoundaries[1], max: heartZoneBoundaries[2] };
                case 4: return { min: heartZoneBoundaries[2], max: heartZoneBoundaries[3] };
                case 5: return { min: heartZoneBoundaries[3], max: maxHeartRate };
                default: return null;
            }
        }

        // Filter data points to only include valid values (> -1 means "set")
        function filterValidPoints(data) {
            return data.filter(function(p) {
                return p && typeof p === 'object' && p.y > -1;
            });
        }

        // Check if data array has any valid (non-negative) y values
        function hasValidData(data) {
            if (!data || data.length === 0) return false;
            return data.some(function(p) {
                return p && typeof p === 'object' && p.y > -1;
            });
        }

        // Create a gradient fill function for HR band based on zone boundaries
        // This creates a vertical gradient where each zone gets its color
        function createHRGradientFill(ctx, chartArea, yScale, hrMinData, hrMaxData) {
            if (!chartArea || !yScale) return 'rgba(255, 29, 0, 0.25)';

            // Find the min and max HR values across the band
            var allYValues = [];
            hrMinData.forEach(function(p) { if (p.y > -1) allYValues.push(p.y); });
            hrMaxData.forEach(function(p) { if (p.y > -1) allYValues.push(p.y); });

            if (allYValues.length === 0) return 'rgba(255, 29, 0, 0.25)';

            var minBpm = Math.min.apply(null, allYValues);
            var maxBpm = Math.max.apply(null, allYValues);

            // Create a vertical gradient from bottom (minBpm) to top (maxBpm)
            var topPixel = yScale.getPixelForValue(maxBpm);
            var bottomPixel = yScale.getPixelForValue(minBpm);

            if (Math.abs(topPixel - bottomPixel) < 1) {
                // Band is too thin, just use a single zone color
                var zone = getHRZone((minBpm + maxBpm) / 2);
                return hrZoneColors[zone].fill;
            }

            var gradient = ctx.createLinearGradient(0, topPixel, 0, bottomPixel);

            // Add color stops at zone boundaries within the band range
            var bpmRange = maxBpm - minBpm;
            var boundaries = [0].concat(heartZoneBoundaries).concat([maxHeartRate]);

            // Build gradient stops
            for (var i = 0; i < boundaries.length - 1; i++) {
                var zoneLow = boundaries[i];
                var zoneHigh = boundaries[i + 1];
                var zone = i + 1;
                if (zone > 5) zone = 5;

                // Check if this zone overlaps with our band range
                var overlapLow = Math.max(zoneLow, minBpm);
                var overlapHigh = Math.min(zoneHigh, maxBpm);

                if (overlapLow < overlapHigh) {
                    // This zone is visible in the band
                    // Gradient stop 0 = topPixel = maxBpm, stop 1 = bottomPixel = minBpm
                    var stopForHigh = (maxBpm - overlapHigh) / bpmRange; // closer to 0 (top)
                    var stopForLow = (maxBpm - overlapLow) / bpmRange;   // closer to 1 (bottom)

                    var color = hrZoneColors[zone] ? hrZoneColors[zone].fill : hrZoneColors[5].fill;
                    gradient.addColorStop(Math.max(0, Math.min(1, stopForHigh)), color);
                    gradient.addColorStop(Math.max(0, Math.min(1, stopForLow)), color);
                }
            }

            return gradient;
        }

        // Determine HR zone line color for a given BPM value (for segment coloring)
        function getHRLineColor(bpm) {
            var zone = getHRZone(bpm);
            return hrZoneColors[zone] ? hrZoneColors[zone].line : hrZoneColors[5].line;
        }

        // Function to create/update the workout chart
        function updateWorkoutChart(workoutData, deviceType) {
            const ctx = document.getElementById('workoutChart').getContext('2d');

            // Destroy existing chart
            if (chart) {
                chart.destroy();
            }

            // Prepare datasets based on device type
            const datasets = [];

            // --- HR BAND (rendered first = behind everything) ---
            var hrMinValid = filterValidPoints(workoutData.hrMin || []);
            var hrMaxValid = filterValidPoints(workoutData.hrMax || []);
            var hasHRBand = hrMinValid.length > 0 && hrMaxValid.length > 0;

            if (hasHRBand) {
                // HR Min line (lower boundary of HR band)
                datasets.push({
                    label: 'HR Min',
                    data: hrMinValid,
                    borderColor: function(context) {
                        if (!context.p0) return hrZoneColors[2].line;
                        return getHRLineColor(context.p0.parsed.y);
                    },
                    borderWidth: 1.5,
                    fill: false,
                    tension: 0,
                    pointRadius: 0,
                    yAxisID: 'yHR',
                    segment: {
                        borderColor: function(ctx) {
                            return getHRLineColor(ctx.p0.parsed.y);
                        }
                    },
                    // Hidden from legend
                    hidden: false
                });

                // HR Max line (upper boundary of HR band) with fill down to HR Min
                datasets.push({
                    label: 'HR Max',
                    data: hrMaxValid,
                    borderColor: function(context) {
                        if (!context.p0) return hrZoneColors[4].line;
                        return getHRLineColor(context.p0.parsed.y);
                    },
                    borderWidth: 1.5,
                    fill: '-1', // Fill to previous dataset (HR Min)
                    backgroundColor: 'rgba(255, 29, 0, 0.15)', // Default, overridden by plugin
                    tension: 0,
                    pointRadius: 0,
                    yAxisID: 'yHR',
                    segment: {
                        borderColor: function(ctx) {
                            return getHRLineColor(ctx.p0.parsed.y);
                        }
                    },
                    hidden: false
                });
            }

            // --- SPEED BAND (minSpeed/maxSpeed) ---
            var minSpeedValid = filterValidPoints(workoutData.minSpeed || []);
            var maxSpeedValid = filterValidPoints(workoutData.maxSpeed || []);
            var hasSpeedBand = minSpeedValid.length > 0 && maxSpeedValid.length > 0;

            if (hasSpeedBand) {
                // Apply miles conversion
                var minSpeedConverted = minSpeedValid.map(function(p) {
                    return { x: p.x, y: p.y * miles };
                });
                var maxSpeedConverted = maxSpeedValid.map(function(p) {
                    return { x: p.x, y: p.y * miles };
                });

                // Min Speed line (lower boundary)
                datasets.push({
                    label: 'Min Speed',
                    data: minSpeedConverted,
                    borderColor: '#3b82f6',
                    borderWidth: 1,
                    fill: false,
                    tension: 0,
                    pointRadius: 0,
                    yAxisID: 'y',
                    borderDash: [4, 2],
                    hidden: false
                });

                // Max Speed line (upper boundary) with fill to Min Speed
                datasets.push({
                    label: 'Max Speed',
                    data: maxSpeedConverted,
                    borderColor: '#3b82f6',
                    borderWidth: 1,
                    fill: '-1', // Fill to previous dataset (Min Speed)
                    backgroundColor: 'rgba(59, 130, 246, 0.4)',
                    tension: 0,
                    pointRadius: 0,
                    yAxisID: 'y',
                    borderDash: [4, 2],
                    hidden: false
                });
            }

            // --- PRIMARY METRIC (speed/watts/resistance line) ---
            const primaryMetric = getPrimaryMetric(deviceType, workoutData);

            if (primaryMetric) {
                datasets.push({
                    label: primaryMetric.label,
                    data: primaryMetric.data,
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 2,
                    fill: !hasSpeedBand, // Only fill under line if no speed band
                    tension: 0.1,
                    pointRadius: 0,
                    yAxisID: 'y'
                });
            }

            // --- SECONDARY METRICS ---
            // Add cadence as secondary metric for bikes
            if (deviceType === 'bike' && workoutData.cadence && workoutData.cadence.length > 0) {
                var validCadence = filterValidPoints(workoutData.cadence);
                if (validCadence.length > 0) {
                    datasets.push({
                        label: 'Cadence (RPM)',
                        data: validCadence,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: 'y1'
                    });
                }
            }

            // Add inclination as secondary metric for treadmills
            if (deviceType === 'treadmill' && workoutData.inclination && workoutData.inclination.length > 0) {
                var validInclination = filterValidPoints(workoutData.inclination);
                if (validInclination.length > 0) {
                    datasets.push({
                        label: 'Inclination (%)',
                        data: validInclination,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: 'y1'
                    });
                }
            }

            // Determine which secondary axis to show
            var hasSecondaryAxis = (deviceType === 'bike' && hasValidData(workoutData.cadence)) ||
                                   (deviceType === 'treadmill' && hasValidData(workoutData.inclination));

            // Determine if HR axis is needed
            var hasHRAxis = hasHRBand;

            // Filter legend to only show meaningful datasets
            var legendFilter = function(item, data) {
                // Hide band boundary datasets from legend
                var hiddenLabels = ['HR Min', 'HR Max', 'Min Speed', 'Max Speed'];
                return hiddenLabels.indexOf(item.text) === -1;
            };

            // Custom plugin for HR gradient fill
            var hrGradientPlugin = {
                id: 'hrGradientFill',
                beforeDraw: function(chart) {
                    if (!hasHRBand) return;

                    // Find the HR Max dataset and apply gradient
                    var hrMaxDatasetIndex = -1;
                    for (var i = 0; i < chart.data.datasets.length; i++) {
                        if (chart.data.datasets[i].label === 'HR Max') {
                            hrMaxDatasetIndex = i;
                            break;
                        }
                    }

                    if (hrMaxDatasetIndex >= 0 && chart.chartArea && chart.scales.yHR) {
                        var gradient = createHRGradientFill(
                            chart.ctx,
                            chart.chartArea,
                            chart.scales.yHR,
                            hrMinValid,
                            hrMaxValid
                        );
                        chart.data.datasets[hrMaxDatasetIndex].backgroundColor = gradient;
                    }
                }
            };

            // Create chart
            chart = new Chart(ctx, {
                type: 'line',
                plugins: [hrGradientPlugin],
                data: {
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: datasets.length > 1,
                            position: 'top',
                            labels: {
                                filter: legendFilter
                            }
                        },
                        tooltip: {
                            enabled: true,
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: '#3b82f6',
                            borderWidth: 1,
                            filter: function(tooltipItem) {
                                // Hide band boundaries from tooltip
                                var hiddenLabels = ['HR Min', 'HR Max', 'Min Speed', 'Max Speed'];
                                return hiddenLabels.indexOf(tooltipItem.dataset.label) === -1;
                            },
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    label += Math.round(context.parsed.y * 10) / 10;
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'linear',
                            title: {
                                display: true,
                                text: 'Time',
                                color: '#666'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                callback: function(value) {
                                    const minutes = Math.floor(value / 60);
                                    const seconds = Math.floor(value % 60);
                                    return minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
                                },
                                color: '#666'
                            }
                        },
                        y: {
                            beginAtZero: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: primaryMetric ? primaryMetric.label : 'Value',
                                color: '#3b82f6'
                            },
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                color: '#3b82f6'
                            }
                        },
                        y1: {
                            beginAtZero: deviceType !== 'treadmill',
                            position: 'right',
                            display: hasSecondaryAxis,
                            title: {
                                display: true,
                                text: deviceType === 'treadmill' ? 'Inclination (%)' : 'Cadence (RPM)',
                                color: deviceType === 'treadmill' ? '#10b981' : '#f59e0b'
                            },
                            grid: {
                                drawOnChartArea: false
                            },
                            ticks: {
                                color: deviceType === 'treadmill' ? '#10b981' : '#f59e0b'
                            }
                        },
                        yHR: {
                            display: hasHRAxis,
                            position: 'right',
                            beginAtZero: false,
                            title: {
                                display: hasHRAxis,
                                text: 'HR (bpm)',
                                color: 'rgb(255, 29, 0)'
                            },
                            grid: {
                                drawOnChartArea: false
                            },
                            ticks: {
                                color: 'rgb(255, 29, 0)'
                            }
                        }
                    }
                }
            });
        }

        // Determine primary metric based on device type
        function getPrimaryMetric(deviceType, workoutData) {
            const { watts, speed, inclination, resistance, cadence } = workoutData;

            // For bikes: show watts (power)
            if (deviceType === 'bike' && hasValidData(watts)) {
                return {
                    label: 'Power (W)',
                    data: filterValidPoints(watts)
                };
            }

            // For treadmills: show speed
            if (deviceType === 'treadmill' && hasValidData(speed)) {
                return {
                    label: 'Speed (' + (miles === 1 ? 'km/h' : 'mph') + ')',
                    data: filterValidPoints(speed).map(function(point) {
                        return { x: point.x, y: point.y * miles };
                    })
                };
            }

            // For ellipticals/rowers: show watts if available, otherwise resistance
            if ((deviceType === 'elliptical' || deviceType === 'rower')) {
                if (hasValidData(watts)) {
                    return {
                        label: 'Power (W)',
                        data: filterValidPoints(watts)
                    };
                }
                if (hasValidData(resistance)) {
                    return {
                        label: 'Resistance',
                        data: filterValidPoints(resistance)
                    };
                }
            }

            // Default: try watts, then speed, then resistance
            if (hasValidData(watts)) {
                return {
                    label: 'Power (W)',
                    data: filterValidPoints(watts)
                };
            }
            if (hasValidData(speed)) {
                return {
                    label: 'Speed (' + (miles === 1 ? 'km/h' : 'mph') + ')',
                    data: filterValidPoints(speed).map(function(point) {
                        return { x: point.x, y: point.y * miles };
                    })
                };
            }
            if (hasValidData(resistance)) {
                return {
                    label: 'Resistance',
                    data: filterValidPoints(resistance)
                };
            }

            return null;
        }

        // Resolve HR targets from zoneHR and/or hrMin/hrMax into unified hrMin/hrMax arrays
        function resolveHRTargets(workoutData) {
            var zoneHR = workoutData.zoneHR || [];
            var hrMin = workoutData.hrMin || [];
            var hrMax = workoutData.hrMax || [];

            // If we have no data at all, return empty
            if (zoneHR.length === 0 && hrMin.length === 0) {
                return { hrMin: [], hrMax: [] };
            }

            var resolvedMin = [];
            var resolvedMax = [];

            // Process each time point - zoneHR takes precedence over explicit hrMin/hrMax
            var maxLen = Math.max(zoneHR.length, hrMin.length, hrMax.length);
            for (var i = 0; i < maxLen; i++) {
                var x = i;
                var zoneVal = (i < zoneHR.length && zoneHR[i]) ? zoneHR[i].y : -1;
                var hrMinVal = (i < hrMin.length && hrMin[i]) ? hrMin[i].y : -1;
                var hrMaxVal = (i < hrMax.length && hrMax[i]) ? hrMax[i].y : -1;

                if (zoneVal >= 1 && zoneVal <= 5) {
                    // Zone HR takes precedence
                    var range = zoneToBpmRange(zoneVal);
                    if (range) {
                        resolvedMin.push({ x: x, y: range.min });
                        resolvedMax.push({ x: x, y: range.max });
                    } else {
                        resolvedMin.push({ x: x, y: -1 });
                        resolvedMax.push({ x: x, y: -1 });
                    }
                } else if (hrMinVal > 0 && hrMaxVal > 0) {
                    // Use explicit HRmin/HRmax
                    resolvedMin.push({ x: x, y: hrMinVal });
                    resolvedMax.push({ x: x, y: hrMaxVal });
                } else {
                    // No HR target for this second
                    resolvedMin.push({ x: x, y: -1 });
                    resolvedMax.push({ x: x, y: -1 });
                }
            }

            return { hrMin: resolvedMin, hrMax: resolvedMax };
        }

        // WebSocket for communication with Qt
        let ws = null;
        let requestTimer = null;
        let lastDataHash = null; // Track last received data to avoid unnecessary redraws

        // Send request for workout preview data
        function requestWorkoutPreview() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                return;
            }

            const message = {
                msg: 'getworkoutpreview',
                content: {}
            };

            console.log('Requesting workout preview data');
            ws.send(JSON.stringify(message));
        }

        // WebSocket setup
        function setupWebSocket() {
            const host = (!location.host || location.host.length == 0) ? 'localhost:6666' : location.host;
            const wsUrl = `ws://${host}/workoutpreview-ws`;

            console.log('Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket connected');

                // Request initial data
                requestWorkoutPreview();

                // Set up periodic updates (every 500ms to catch changes)
                if (requestTimer) {
                    clearInterval(requestTimer);
                }
                requestTimer = setInterval(requestWorkoutPreview, 500);
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    console.error('Error parsing message:', e);
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };

            ws.onclose = function() {
                console.log('WebSocket closed, attempting reconnect in 5 seconds');
                if (requestTimer) {
                    clearInterval(requestTimer);
                    requestTimer = null;
                }
                setTimeout(setupWebSocket, 5000);
            };
        }

        // Handle incoming WebSocket messages
        function handleMessage(data) {
            console.log('Received message:', data);

            const msgType = data.type || data.msg;

            if (msgType === 'workoutpreview' || msgType === 'R_workoutpreview') {
                const content = data.content || data;
                updateWorkoutFromData(content);
            }
        }

        // Update chart from WebSocket data
        function updateWorkoutFromData(data) {
            // Create a hash of the data to detect changes
            const dataHash = JSON.stringify({
                points: data.points,
                watts: data.watts,
                speed: data.speed,
                inclination: data.inclination,
                resistance: data.resistance,
                cadence: data.cadence,
                minSpeed: data.minSpeed,
                maxSpeed: data.maxSpeed,
                hrMin: data.hrMin,
                hrMax: data.hrMax,
                zoneHR: data.zoneHR,
                deviceType: data.deviceType
            });

            // Only update if data has changed
            if (dataHash === lastDataHash) {
                return;
            }

            lastDataHash = dataHash;

            const { points, watts, speed, inclination, resistance, cadence,
                    minSpeed, maxSpeed, hrMin, hrMax, zoneHR,
                    deviceType, miles_unit,
                    maxHeartRate: mhr, heartRateZone1, heartRateZone2, heartRateZone3, heartRateZone4 } = data;

            // Update miles setting if provided
            if (miles_unit !== undefined) {
                miles = miles_unit ? 0.621371 : 1;
            }

            // Update HR zone settings if provided
            if (mhr !== undefined && mhr > 0) {
                maxHeartRate = mhr;
            }
            if (heartRateZone1 !== undefined) {
                // Zone percentages -> absolute BPM boundaries
                heartZoneBoundaries = [
                    Math.round(maxHeartRate * (heartRateZone1 / 100)),
                    Math.round(maxHeartRate * (heartRateZone2 / 100)),
                    Math.round(maxHeartRate * (heartRateZone3 / 100)),
                    Math.round(maxHeartRate * (heartRateZone4 / 100))
                ];
            }

            // Resolve HR targets (zoneHR takes precedence over hrMin/hrMax)
            var resolvedHR = resolveHRTargets({
                zoneHR: zoneHR || [],
                hrMin: hrMin || [],
                hrMax: hrMax || []
            });

            const workoutData = {
                watts: watts || [],
                speed: speed || [],
                inclination: inclination || [],
                resistance: resistance || [],
                cadence: cadence || [],
                minSpeed: minSpeed || [],
                maxSpeed: maxSpeed || [],
                hrMin: resolvedHR.hrMin,
                hrMax: resolvedHR.hrMax
            };

            // The C++ backend always populates watts even for treadmill workouts where
            // power is unset (sent as y = -1).  Detect the actual device type from data.
            var hasValidWatts = workoutData.watts.some(function(p) {
                return (p !== null && typeof p === 'object' && p.y !== undefined) ? p.y >= 0 : Number(p) >= 0;
            });
            var actualDeviceType = deviceType || 'bike';
            if (!hasValidWatts) {
                if (workoutData.speed.length > 0) {
                    actualDeviceType = 'treadmill';
                } else if (workoutData.resistance.length > 0) {
                    actualDeviceType = 'elliptical';
                }
            }

            console.log('Updating chart with new data');
            updateWorkoutChart(workoutData, actualDeviceType);
        }

        // External API for backwards compatibility (if needed)
        window.setWorkoutData = updateWorkoutFromData;

        // Initialize WebSocket connection
        setupWebSocket();

        // Initialize with empty chart
        window.addEventListener('load', function() {
            updateWorkoutChart({
                watts: [],
                speed: [],
                inclination: [],
                resistance: [],
                cadence: [],
                minSpeed: [],
                maxSpeed: [],
                hrMin: [],
                hrMax: []
            }, 'bike');
        });
    </script>
</body>
</html>
